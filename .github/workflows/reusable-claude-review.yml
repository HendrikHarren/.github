name: Reusable — Claude Code Review

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label (e.g. ubuntu-latest, self-hosted)'
        type: string
        default: 'self-hosted'
      claude-args:
        description: 'Additional CLI arguments for claude-code (e.g. --model claude-sonnet-4-6)'
        type: string
        default: ''
      review-prompt:
        description: 'Review prompt passed directly to claude-code-action'
        type: string
        required: true
      show-full-output:
        description: 'Show full Claude output for debugging (WARNING: may expose secrets in logs)'
        type: boolean
        default: false

jobs:
  claude-review:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 20

    steps:
      - name: Install dependencies
        run: |
          if ! command -v unzip &>/dev/null || ! command -v gh &>/dev/null; then
            sudo apt-get update -qq
            command -v unzip &>/dev/null || sudo apt-get install -y -qq unzip
            if ! command -v gh &>/dev/null; then
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
              sudo apt-get update -qq && sudo apt-get install -y -qq gh
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ inputs.review-prompt }}
          claude_args: ${{ inputs.claude-args }}
          show_full_output: ${{ inputs.show-full-output }}
