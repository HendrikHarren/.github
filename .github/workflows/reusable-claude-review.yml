name: Reusable — Claude Code Review

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label (e.g. ubuntu-latest, self-hosted)'
        type: string
        default: 'self-hosted'
      claude-args:
        description: 'Additional CLI arguments for claude-code (e.g. --model claude-sonnet-4-6)'
        type: string
        default: ''
      review-prompt:
        description: 'Review prompt passed directly to claude-code-action'
        type: string
        required: true
      show-full-output:
        description: 'Show full Claude output for debugging (WARNING: may expose secrets in logs)'
        type: boolean
        default: false

jobs:
  claude-review:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 20

    steps:
      - name: Install dependencies
        run: |
          # Install gh CLI to user-local bin if not available
          if ! command -v gh &>/dev/null; then
            GH_VERSION=$(curl -sL https://api.github.com/repos/cli/cli/releases/latest | grep '"tag_name"' | head -1 | sed 's/.*"v\(.*\)".*/\1/')
            mkdir -p "$HOME/.local/bin"
            curl -sL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | tar xz -C /tmp
            cp "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" "$HOME/.local/bin/gh"
            chmod +x "$HOME/.local/bin/gh"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ inputs.review-prompt }}
          claude_args: ${{ inputs.claude-args }}
          show_full_output: ${{ inputs.show-full-output }}
