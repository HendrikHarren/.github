name: Reusable — Claude Code Review

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label (e.g. ubuntu-latest, self-hosted)'
        type: string
        default: 'self-hosted'
      claude-args:
        description: 'Additional CLI arguments for claude-code (e.g. --model claude-sonnet-4-6)'
        type: string
        default: ''
      review-prompt:
        description: 'Review prompt passed directly to claude-code-action'
        type: string
        required: true
      show-full-output:
        description: 'Show full Claude output for debugging (WARNING: may expose secrets in logs)'
        type: boolean
        default: false

jobs:
  claude-review:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 20

    steps:
      - name: Install unzip
        run: |
          if ! command -v unzip &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq unzip
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ inputs.review-prompt }}
          claude_args: ${{ inputs.claude-args }}
          show_full_output: ${{ inputs.show-full-output }}
